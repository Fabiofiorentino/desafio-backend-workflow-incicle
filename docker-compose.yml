services:
  api:
    build: .
    container_name: workflow-incicle-api
    ports:
      - "${APP_PORT}:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - rabbitmq
    command: npm run start:dev
    volumes:
      - .:/app
      - /app/node_modules
    restart: always

  postgres:
    image: postgres:15
    container_name: workflow-incicle-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: workflow-incicle-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: workflow-incicle-swagger
    ports:
      - "8080:8080"
    environment:
      SWAGGER_JSON: /api/openapi.yaml
    volumes:
      - ./openapi.yaml:/api/openapi.yaml

volumes:
  pgdata:
