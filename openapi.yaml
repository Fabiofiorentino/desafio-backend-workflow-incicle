openapi: 3.0.3
info:
  title: Workflow InCicle API
  version: 1.0.0
  description: Desafio Backend Workflow InCicle

servers:
  - url: http://localhost:3000
    description: Local

components:
  parameters:
    CompanyIdHeader:
      name: company-id
      in: header
      required: true
      schema:
        type: string
      description: Company identifier (multi-tenant)

  schemas:
    CreateTemplateDto:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Aprovação Simples
        description:
          type: string
          example: Template para workflow de aprovação de documentos
      
    Template:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        companyId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TemplateVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        version:
          type: integer
        isActive:
          type: boolean
          schema:
            type: object
            description: Estrutura do workflow congelada na versão
            additionalProperties: true
        createdAt:
          type: string
          format: date-time

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        info:
          type: object

    CreateInstanceDto:
      type: object
      required:
        - templateVersionId
      properties:
        templateVersionId:
          type: string
          format: uuid

    Instance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        templateVersionId:
          type: string
          format: uuid
        snapshot:
          type: object
          description: Snapshot imutável do schema da versão publicada
          additionalProperties: true
        status:
          type: string
          enum: [DRAFT, SUBMITTED]
        submittedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InstanceTimeline:
      type: object
      properties:
        instanceId:
          type: string
          format: uuid
        status:
          type: string
          enum: [DRAFT, SUBMITTED]
        events:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                example: created
              date:
                type: string
                format: date-time

paths:
  /health:
    get:
      summary: Health check da aplicação
      tags:
        - Health
      responses:
        '200':
          description: Aplicação saudável
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Dependência indisponível

  /templates:
    post:
      summary: Criar novo template
      tags:
        - Templates
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateDto'
      responses:
        '201':
          description: Template criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          description: Dados inválidos
        '401':
          description: Não autenticado

    get:
      summary: Listar templates da empresa
      tags:
        - Templates
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
      responses:
        '200':
          description: Lista de templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Template'
        '401':
          description: Não autenticado

  /templates/{id}:
    get:
      summary: Obter template por ID
      tags:
        - Templates
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do template
      responses:
        '200':
          description: Detalhes do template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          description: Template não encontrado
        '401':
          description: Não autenticado

  /templates/{id}/versions:
    post:
      summary: Criar nova versão do template
      tags:
        - Templates
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do template
      responses:
        '201':
          description: Versão criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateVersion'
        '404':
          description: Template não encontrado
        '400':
          description: Dados inválidos
        '401':
          description: Não autenticado

    get:
      summary: Listar versões do template
      tags:
        - Templates
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do template
      responses:
        '200':
          description: Lista de versões
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TemplateVersion'
        '404':
          description: Template não encontrado
        '401':
          description: Não autenticado

  /templates/{id}/versions/{versionId}/publish:
    post:
      summary: Publicar versão (apenas uma permitida como ativa)
      tags:
        - Templates
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do template
        - name: versionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID da versão
      responses:
        '200':
          description: Versão publicada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateVersion'
        '404':
          description: Template ou versão não encontrado
        '409':
          description: Conflito ao publicar versão
        '401':
          description: Não autenticado

  /instances:
    post:
      summary: Criar uma nova instância
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstanceDto'
      responses:
        '201':
          description: Instância criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'

    get:
      summary: Listar instâncias da empresa
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
      responses:
        '200':
          description: Lista de instâncias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Instance'

  /instances/{id}:
    get:
      summary: Buscar instância por ID
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Instância encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '404':
          description: Instância não encontrada

  /instances/{id}/submit:
    post:
      summary: Submeter instância (congela snapshot)
      tags:
        - Instances
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID da instância
      responses:
        '200':
          description: Instância submetida com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '400':
          description: Instância já submetida
        '404':
          description: Instância não encontrada
        '401':
          description: Não autenticado

  /instances/{id}/submit:
    post:
      summary: Submeter instância
      parameters:
        - $ref: '#/components/parameters/CompanyIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Instância submetida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '400':
          description: Já submetida
        '404':
          description: Não encontrada